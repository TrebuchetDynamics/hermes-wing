name: navivox
description: Flutter Hermes Agent companion UI with local continuous voice.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.0
  uuid: ^4.5.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  web: ^1.1.1
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.5
  audioplayers: ^6.5.1
  path_provider: ^2.1.5
  kokorodart:
    git:
      url: https://github.com/TrebuchetDynamics/kokorodart.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - navivox-app-icon.png
